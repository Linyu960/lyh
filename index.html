<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>佑佑与无尽阶梯 - 梦境</title>
    <style>
        :root { --bg: #020208; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
        body {
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
            touch-action: manipulation; -webkit-touch-callout: none;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent; -webkit-overflow-scrolling: none; overscroll-behavior: none;
        }
        .game-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 0; max-height: 100vh; max-width: 100vw; padding: 0; }
        canvas {
            display: block; image-rendering: auto; border-radius: 8px;
            box-shadow: 0 0 80px rgba(140,150,200,0.18), 0 0 160px rgba(120,130,180,0.08), 0 0 30px rgba(200,180,220,0.06);
            max-height: calc(100vh - 150px); max-width: 95vw;
            aspect-ratio: 480 / 750; object-fit: contain;
            touch-action: manipulation; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        @media (max-width: 768px), (hover: none) and (pointer: coarse) {
            canvas {
                max-height: none !important; max-width: none !important;
                width: 100vw; height: 100vh;
                object-fit: cover; border-radius: 0; box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <audio id="bgMusic" loop preload="auto">
        <source src="松本文紀 - 暖かな時間.mp3" type="audio/mpeg">
    </audio>
    <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const GAME_W = 480, GAME_H = 750;
            const PI = Math.PI, sin = Math.sin, cos = Math.cos, random = Math.random, floor = Math.floor, abs = Math.abs;

            function resizeCanvas() {
                const isMobile = window.innerWidth <= 768 || (('ontouchstart' in window) && window.innerWidth < 1024);
                if (isMobile) { canvas.width = GAME_W; canvas.height = GAME_H; canvas.style.width = '100vw'; canvas.style.height = '100vh'; return; }
                const maxW = Math.min(window.innerWidth * 0.95, 480);
                const maxH = Math.min(window.innerHeight - 170, 750);
                const scale = Math.min(maxW / GAME_W, maxH / GAME_H);
                canvas.style.width = (GAME_W * scale) + 'px';
                canvas.style.height = (GAME_H * scale) + 'px';
                canvas.width = GAME_W; canvas.height = GAME_H;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            ctx.imageSmoothingEnabled = true;

            let audioCtx = null;
            function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
            function playFootstep() {
                if (!audioCtx) initAudio(); if (!audioCtx || audioCtx.state === 'suspended') return;
                const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.06);
                gain.gain.setValueAtTime(0.55, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                osc.connect(gain).connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.12);
            }
            function playDogBark() {
                if (!audioCtx) initAudio(); if (!audioCtx || audioCtx.state === 'suspended') return;
                const now = audioCtx.currentTime;
                function bark(time) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, time); osc.frequency.exponentialRampToValueAtTime(350, time + 0.08); gain.gain.setValueAtTime(0.1, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15); osc.connect(gain).connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.15); }
                bark(now); bark(now + 0.22);
            }

            const bgMusic = document.getElementById('bgMusic'); bgMusic.volume = 0.04; let musicStarted = false;
            function startMusic() { if (!musicStarted && bgMusic) { bgMusic.play().then(() => { musicStarted = true; }).catch(() => {}); } }
            function unlockAudio() { initAudio(); if (!musicStarted && bgMusic) { bgMusic.play().then(() => { bgMusic.pause(); bgMusic.currentTime = 0; }).catch(() => {}); } document.removeEventListener('click', unlockAudio); document.removeEventListener('touchstart', unlockAudio); document.removeEventListener('keydown', unlockAudio); }
            document.addEventListener('click', unlockAudio); document.addEventListener('touchstart', unlockAudio); document.addEventListener('keydown', unlockAudio);

            function screenToGameCoords(clientX, clientY) {
                const rect = canvas.getBoundingClientRect(); const canvasAspect = GAME_W / GAME_H, rectAspect = rect.width / rect.height;
                let renderWidth, renderHeight, offsetX, offsetY;
                if (rectAspect > canvasAspect) { renderHeight = rect.height; renderWidth = rect.height * canvasAspect; offsetX = (rect.width - renderWidth) / 2; offsetY = 0; }
                else { renderWidth = rect.width; renderHeight = rect.width / canvasAspect; offsetX = 0; offsetY = (rect.height - renderHeight) / 2; }
                const gameX = (clientX - rect.left - offsetX) / renderWidth * GAME_W;
                const gameY = (clientY - rect.top - offsetY) / renderHeight * GAME_H;
                return { x: Math.max(0, Math.min(GAME_W, gameX)), y: Math.max(0, Math.min(GAME_H, gameY)) };
            }

            let clickRipples = [];
            function addClickRipple(gameX, gameY, color = '#f0d890') { clickRipples.push({ x: gameX, y: gameY, radius: 2, maxRadius: 28 + random() * 18, life: 1, decay: 0.025 + random() * 0.02, color, glowColor: color === '#f0d890' ? '#ffe8b0' : '#ffd0d8' }); if (clickRipples.length > 12) clickRipples.shift(); }
            function updateClickRipples() { for (let i = clickRipples.length - 1; i >= 0; i--) { const r = clickRipples[i]; r.radius += (r.maxRadius - r.radius) * 0.15; r.life -= r.decay; if (r.life <= 0) clickRipples.splice(i, 1); } }
            function drawClickRipples(ctx) { for (const r of clickRipples) { const alpha = r.life; ctx.globalAlpha = alpha * 0.35; ctx.strokeStyle = r.glowColor; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, PI * 2); ctx.stroke(); ctx.globalAlpha = alpha * 0.55; ctx.strokeStyle = r.color; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.arc(r.x, r.y, r.radius * 0.55, 0, PI * 2); ctx.stroke(); ctx.globalAlpha = alpha * 0.8; ctx.fillStyle = r.color; ctx.beginPath(); ctx.arc(r.x, r.y, 2.5, 0, PI * 2); ctx.fill(); } ctx.globalAlpha = 1; }

            const keys = {}; let actionPressed = false, actionJustPressed = false;
            window.addEventListener('keydown', (e) => { keys[e.key] = true; if (e.key === ' ' || e.key === 'Enter' || e.key === 'e' || e.key === 'E') { if (!actionPressed) actionJustPressed = true; actionPressed = true; e.preventDefault(); } if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
            window.addEventListener('keyup', (e) => { keys[e.key] = false; if (e.key === ' ' || e.key === 'Enter' || e.key === 'e' || e.key === 'E') actionPressed = false; });
            const mobileKeys = { up: false, down: false, left: false, right: false }; let mobileActionPressed = false, mobileActionJust = false;
            function isUp() { return keys['ArrowUp'] || keys['w'] || keys['W'] || mobileKeys.up; }
            function isDown() { return keys['ArrowDown'] || keys['s'] || keys['S'] || mobileKeys.down; }
            function isLeft() { return keys['ArrowLeft'] || keys['a'] || keys['A'] || mobileKeys.left; }
            function isRight() { return keys['ArrowRight'] || keys['d'] || keys['D'] || mobileKeys.right; }
            function isActionJust() { const r = actionJustPressed || mobileActionJust; actionJustPressed = false; mobileActionJust = false; return r; }
            function isAnyKeyPressed() { return isUp() || isDown() || isLeft() || isRight(); }

            const STEP_HEIGHT = 28, STEP_DEPTH = 18, STEP_WIDTH = 160;
            const STEP_X = (GAME_W - STEP_WIDTH) / 2, STEP_RIGHT = STEP_X + STEP_WIDTH;

            const formulaTexts = [ 'E=mc²', '∫f(x)dx', '√-1', 'π≈3.1415', 'Σ∞', '∂/∂x', 'lim→∞', 'i²=-1', '∇·F', 'Δx→0', 'e^iπ+1=0', 'ℵ', '∮', '∞', '∑n=1', 'φ', 'λ', 'θ', 'Ω', 'α+β', 'f\'(x)', '∃∀', '⊂', '∩∪', '⇒⇐', 'sin²+cos²=1', 'det(A)', '||v||', '⌊x⌋', 'ℜ(z)', '⊗', '⊕', 'x²+y²=r²', 'log₂(x)', 'ℏ', '∝', '∈', '∉', '∪∩', '⊆', '∅', '∇²φ=0', 'Γ(n)', 'ζ(s)', '∀ε>0', '∃δ>0', '∂²u/∂t²', 'ħ', 'ℓ', '℘', '⊤', '⊥', '⊢', '⊨', '≅', '≈', '⌈x⌉', '⌊x⌋', '⊗', '⊕', '⊖', '⊘', '∏ᵢ₌₁', '∑ₙ₌₁', '∫ₐᵇ', '∬', '∭', '∯', '∇×F', '∇·B=0', '∂E/∂t', '∇×H=J', '∳', '∲', 'ℂ', 'ℍ', 'ℕ', 'ℙ', 'ℚ', 'ℝ', '𝕊', '𝕋', '𝕌', '𝕍', '𝕎', '𝕏' ];
            const formulaColors = ['#ffffff', '#fafafa', '#f5f5ff', '#fff8f5', '#f8f8ff', '#fffaf5', '#f5f8ff', '#faf5ff', '#fff5f5', '#f5fff8'];

            class FormulaParticle {
                constructor() { this.reset(true); }
                reset(initial = false) { this.x = random() * GAME_W; this.y = initial ? random() * GAME_H : (random() < 0.5 ? -60 : GAME_H + 60); this.text = formulaTexts[floor(random() * formulaTexts.length)]; this.baseColor = formulaColors[floor(random() * formulaColors.length)]; this.size = 10 + random() * 20; this.speedX = (random() - 0.5) * 0.15; this.speedY = -0.05 - random() * 0.12; this.baseAlpha = 0.2 + random() * 0.3; this.alpha = this.baseAlpha; this.wobbleAmp = 0.3 + random() * 0.6; this.wobbleSpeed = 0.0015 + random() * 0.004; this.wobbleOffset = random() * PI * 2; this.life = floor(random() * 1000); this.twinklePhase = random() * PI * 2; this.twinkleSpeed = 0.008 + random() * 0.02; this.glowSize = 3 + random() * 6; }
                update() { this.life++; this.x += this.speedX + sin(this.life * this.wobbleSpeed + this.wobbleOffset) * this.wobbleAmp * 0.2; this.y += this.speedY + cos(this.life * this.wobbleSpeed * 1.3 + this.wobbleOffset) * this.wobbleAmp * 0.12; const twinkle = sin(this.life * this.twinkleSpeed + this.twinklePhase); this.alpha = this.baseAlpha + twinkle * 0.12; this.alpha = Math.max(0.12, Math.min(0.55, this.alpha)); if (this.y < -80 || this.y > GAME_H + 80 || this.x < -120 || this.x > GAME_W + 120) { this.reset(false); if (random() < 0.5) { this.y = -60; this.x = random() * GAME_W; } else { this.y = GAME_H + 60; this.x = random() * GAME_W; } } }
                draw(ctx) { ctx.save(); const glowAlpha = this.alpha * 0.4; const glowSize = this.glowSize; for (let ox = -glowSize; ox <= glowSize; ox += glowSize) { for (let oy = -glowSize; oy <= glowSize; oy += glowSize) { if (ox === 0 && oy === 0) continue; const dist = Math.sqrt(ox * ox + oy * oy); if (dist > glowSize + 1) continue; ctx.globalAlpha = glowAlpha * (1 - dist / (glowSize + 2)); ctx.fillStyle = this.baseColor; ctx.font = `${this.size}px "Courier New", "Noto Serif SC", "Georgia", monospace`; ctx.fillText(this.text, this.x + ox, this.y + oy); } } ctx.globalAlpha = this.alpha; ctx.fillStyle = '#ffffff'; ctx.font = `${this.size}px "Courier New", "Noto Serif SC", "Georgia", monospace`; ctx.fillText(this.text, this.x, this.y); ctx.restore(); }
            }

            class StairParticle {
                constructor() { this.reset(true); }
                reset(initial = false) { const margin = 40; this.x = STEP_X - margin + random() * (STEP_WIDTH + margin * 2); this.y = initial ? random() * GAME_H : GAME_H + 40; this.text = formulaTexts[floor(random() * formulaTexts.length)]; this.baseColor = formulaColors[floor(random() * formulaColors.length)]; this.size = 12 + random() * 18; this.speedY = -0.18 - random() * 0.25; this.speedX = (random() - 0.5) * 0.12; this.alpha = 0.3 + random() * 0.35; this.twinklePhase = random() * PI * 2; this.twinkleSpeed = 0.01 + random() * 0.03; this.life = floor(random() * 500); }
                update() { this.life++; this.y += this.speedY; this.x += this.speedX; const twinkle = sin(this.life * this.twinkleSpeed + this.twinklePhase); this.alpha = 0.25 + twinkle * 0.2; this.alpha = Math.max(0.2, Math.min(0.6, this.alpha)); if (this.y < -60) { this.reset(false); this.y = GAME_H + 30; const margin = 40; this.x = STEP_X - margin + random() * (STEP_WIDTH + margin * 2); } if (this.x < STEP_X - 80) this.speedX = abs(this.speedX); if (this.x > STEP_RIGHT + 80) this.speedX = -abs(this.speedX); }
                draw(ctx) { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = '#ffffff'; ctx.font = `${this.size}px "Courier New", "Noto Serif SC", "Georgia", monospace`; ctx.fillText(this.text, this.x, this.y); ctx.globalAlpha = this.alpha * 0.35; ctx.fillStyle = this.baseColor; ctx.fillText(this.text, this.x + 1, this.y + 1); ctx.restore(); }
            }

            class LightPoint {
                constructor() { this.reset(true); }
                reset(initial = false) { const centerBias = (GAME_W - 200) / 2; this.x = centerBias + random() * 200; this.y = initial ? random() * GAME_H : GAME_H + 30; if (initial && random() < 0.4) { this.y = GAME_H * 0.3 + random() * GAME_H * 0.5; } this.size = 1.5 + random() * 3.5; const colorType = random(); if (colorType < 0.5) { this.coreColor = '#ffffff'; this.glowColor = '#ffffff'; } else if (colorType < 0.8) { this.coreColor = '#f0f0ff'; this.glowColor = '#ffffff'; } else { this.coreColor = '#fff8f0'; this.glowColor = '#ffffff'; } this.speedX = (random() - 0.5) * 0.15; this.speedY = -0.1 - random() * 0.3; this.baseAlpha = 0.3 + random() * 0.5; this.alpha = this.baseAlpha; this.wobbleAmp = 0.3 + random() * 0.7; this.wobbleSpeed = 0.006 + random() * 0.02; this.wobbleOffset = random() * PI * 2; this.life = floor(random() * 500); this.twinklePhase = random() * PI * 2; this.twinkleSpeed = 0.02 + random() * 0.06; this.glowRadius = this.size * 2.5 + random() * 4; }
                update() { this.life++; this.x += this.speedX + sin(this.life * this.wobbleSpeed + this.wobbleOffset) * this.wobbleAmp; this.y += this.speedY; const twinkle = sin(this.life * this.twinkleSpeed + this.twinklePhase); this.alpha = this.baseAlpha + twinkle * 0.25; this.alpha = Math.max(0.2, Math.min(0.8, this.alpha)); if (this.y < -40 || this.y > GAME_H + 40 || this.x < -60 || this.x > GAME_W + 60) { this.reset(false); this.y = GAME_H + 20 + random() * 20; const centerBias = (GAME_W - 200) / 2; this.x = centerBias + random() * 200; } }
                draw(ctx) { ctx.save(); const gr = this.glowRadius; const outerGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gr); outerGrad.addColorStop(0, this.glowColor); outerGrad.addColorStop(0.25, this.glowColor); outerGrad.addColorStop(0.7, 'rgba(0,0,0,0)'); outerGrad.addColorStop(1, 'rgba(0,0,0,0)'); ctx.globalAlpha = this.alpha * 0.5; ctx.fillStyle = outerGrad; ctx.beginPath(); ctx.arc(this.x, this.y, gr, 0, PI * 2); ctx.fill(); const midGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gr * 0.5); midGrad.addColorStop(0, this.coreColor); midGrad.addColorStop(0.5, this.glowColor); midGrad.addColorStop(1, 'rgba(0,0,0,0)'); ctx.globalAlpha = this.alpha * 0.7; ctx.fillStyle = midGrad; ctx.beginPath(); ctx.arc(this.x, this.y, gr * 0.5, 0, PI * 2); ctx.fill(); ctx.globalAlpha = this.alpha; ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 0.55, 0, PI * 2); ctx.fill(); ctx.restore(); }
            }

            const formulaParticles = []; for (let i = 0; i < 120; i++) formulaParticles.push(new FormulaParticle());
            const stairParticles = []; for (let i = 0; i < 25; i++) stairParticles.push(new StairParticle());
            const lightPoints = []; for (let i = 0; i < 40; i++) lightPoints.push(new LightPoint());

            let playerStepIndex = 10; const INITIAL_PLAYER_STEP = 10;
            let playerX = GAME_W / 2, worldOffsetY = 0, playerFacing = 'down';
            const DOG_STEP_INDEX = 5; let dogX = GAME_W / 2, dogVisible = true;
            let dogApproachPhase = 0, dogApproachTimer = 0, dogJumpAnim = 0, dogJumpPhase = 0;
            let targetX = null, targetStepIndex = null, hasTarget = false;
            const AUTO_MOVE_SPEED_X = 2.0, AUTO_MOVE_SPEED_STEP = 0.08, TARGET_REACH_THRESHOLD_X = 3, TARGET_REACH_THRESHOLD_STEP = 0.3;
            let footstepCooldown = 0;
            const LIGHT_SOURCE_STEP = -53;

            function worldStepToScreenY(stepIndex) { return GAME_H / 2 + (stepIndex - playerStepIndex) * STEP_HEIGHT - worldOffsetY; }
            function getPlayerScreenY() { return GAME_H / 2 - worldOffsetY; }
            function getPlayerScreenX() { return playerX; }
            function getCurrentDogStep() { if (dogApproachPhase === 0) return DOG_STEP_INDEX; if (dogApproachPhase === 1) return DOG_STEP_INDEX + (dogApproachTimer * 0.02); return playerStepIndex + 1.5; }
            function getDogScreenPosition() { if (!dogVisible && dogApproachPhase === 0) return null; const dogStep = getCurrentDogStep(); const screenY = worldStepToScreenY(dogStep); if (screenY < -60 || screenY > GAME_H + 60) return null; let sx = dogX, sy = screenY; if (dogJumpPhase === 1) { const jp = dogJumpAnim / 50; sy -= sin(jp * PI) * 35; } else if (dogJumpPhase === 2) { sy = getPlayerScreenY() - 18; sx = getPlayerScreenX() + 8; } else if (dogJumpPhase === 3) { const fp = 1 - (dogJumpAnim / 90); sy = getPlayerScreenY() - 18 + fp * 18; } return { x: sx, y: sy, step: dogStep }; }

            const STATE = { EXPLORING: 'exploring', DOG_APPROACH: 'dog_approach', DIALOGUE: 'dialogue', FINISHED: 'finished' };
            let gameState = STATE.EXPLORING;
            let dialogueQueue = [], dialogueIndex = 0, dialogueCharIndex = 0, dialogueText = '', dialogueSpeaker = '', dialogueFullText = '', dialogueTimer = 0;
            const DIALOGUE_CHAR_SPEED = 2;
            let heartParticles = [];
            function spawnHeart(x, y) { for (let i = 0; i < 10; i++) { heartParticles.push({ x, y, vx: (random() - 0.5) * 2.8, vy: -random() * 3.5 - 1.5, life: 45 + random() * 45, maxLife: 90, size: 3 + random() * 12, color: random() < 0.5 ? '#ff8aa8' : '#ffb8c8', glowColor: random() < 0.5 ? '#ffc0d0' : '#ffe0e8' }); } }
            function updateHeartParticles() { for (let i = heartParticles.length - 1; i >= 0; i--) { const p = heartParticles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.life--; if (p.life <= 0) heartParticles.splice(i, 1); } }
            function drawHeartParticles(ctx) { for (const p of heartParticles) { const alpha = Math.max(0, p.life / p.maxLife), s = p.size; ctx.globalAlpha = alpha * 0.4; ctx.fillStyle = p.glowColor; ctx.beginPath(); ctx.arc(p.x, p.y, s * 0.8, 0, PI * 2); ctx.fill(); ctx.globalAlpha = alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s); ctx.fillRect(p.x - s / 2 - s * 0.35, p.y - s / 2 + s * 0.3, s * 0.7, s * 0.7); ctx.fillRect(p.x + s / 2 - s * 0.35, p.y - s / 2 + s * 0.3, s * 0.7, s * 0.7); } ctx.globalAlpha = 1; }
            function startDialogue(lines) { dialogueQueue = lines; dialogueIndex = 0; gameState = STATE.DIALOGUE; startDialogueLine(); }
            function startDialogueLine() { if (dialogueIndex >= dialogueQueue.length) { dialogueQueue = []; dialogueIndex = 0; dialogueCharIndex = 0; dialogueText = ''; dialogueSpeaker = ''; dialogueFullText = ''; if (dogJumpPhase === 2 && gameState === STATE.DIALOGUE) { dogJumpPhase = 3; dogJumpAnim = 90; } gameState = STATE.FINISHED; return; } const line = dialogueQueue[dialogueIndex]; dialogueSpeaker = line.speaker; dialogueFullText = line.text; dialogueText = ''; dialogueCharIndex = 0; dialogueTimer = 0; }
            function advanceDialogue() { if (dialogueCharIndex < dialogueFullText.length) { dialogueCharIndex = dialogueFullText.length; dialogueText = dialogueFullText; } else { dialogueIndex++; if (dialogueIndex >= dialogueQueue.length) { dialogueQueue = []; dialogueIndex = 0; dialogueCharIndex = 0; dialogueText = ''; dialogueSpeaker = ''; dialogueFullText = ''; if (dogJumpPhase === 2) { dogJumpPhase = 3; dogJumpAnim = 90; spawnHeart(getPlayerScreenX(), getPlayerScreenY() - 30); } gameState = STATE.FINISHED; } else { startDialogueLine(); } } }
            function updateDialogue() { if (gameState !== STATE.DIALOGUE) return; dialogueTimer++; if (dialogueCharIndex < dialogueFullText.length && dialogueTimer % DIALOGUE_CHAR_SPEED === 0) { dialogueCharIndex++; dialogueText = dialogueFullText.substring(0, dialogueCharIndex); } }

                pawGlow.addColorStop(0, 'rgba(0,0,0,0.3)'); pawGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = pawGlow; ctx.fillRect(cx - 14 * s, cy + 3 * s, 28 * s, 14 * s);
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(cx - 10 * s, cy + 8 * s, 20 * s, 2.5 * s);
                ctx.fillStyle = '#d4b896'; ctx.fillRect(cx + 8 * s, cy - 4 * s, 3 * s, 8 * s);
                ctx.fillStyle = '#e0c8a8'; ctx.fillRect(cx + 9 * s, cy - 5 * s, 2 * s, 7 * s);
                ctx.fillStyle = '#c8a882'; ctx.fillRect(cx + 4 * s, cy + 2 * s, 4 * s, 7 * s); ctx.fillRect(cx - 6 * s, cy + 2 * s, 4 * s, 7 * s);
                ctx.fillStyle = '#e0c8a8'; ctx.fillRect(cx - 8 * s, cy - 3 * s, 16 * s, 8 * s);
                ctx.fillStyle = '#e8d5b7'; ctx.fillRect(cx - 6 * s, cy - 2 * s, 12 * s, 5 * s);
                ctx.fillStyle = '#f0e0c8'; ctx.fillRect(cx - 3 * s, cy + 1 * s, 6 * s, 3 * s);
                ctx.fillStyle = '#c8a882'; ctx.fillRect(cx - 7 * s, cy + 2 * s, 3 * s, 7 * s); ctx.fillRect(cx - 1 * s, cy + 2 * s, 3 * s, 7 * s);
                ctx.fillStyle = '#e0c8a8'; ctx.fillRect(cx - 7 * s, cy - 10 * s, 14 * s, 9 * s);
                ctx.fillStyle = '#c4956a'; ctx.fillRect(cx - 8 * s, cy - 12 * s, 5 * s, 6 * s); ctx.fillRect(cx + 3 * s, cy - 12 * s, 5 * s, 6 * s);
                ctx.fillStyle = '#d4a878'; ctx.fillRect(cx - 7 * s, cy - 11 * s, 3 * s, 4 * s); ctx.fillRect(cx + 4 * s, cy - 11 * s, 3 * s, 4 * s);
                ctx.fillStyle = '#e8d5b7'; ctx.fillRect(cx - 5 * s, cy - 9 * s, 10 * s, 6 * s);
                ctx.fillStyle = '#1a1a1a'; ctx.fillRect(cx - 1 * s, cy - 5 * s, 3 * s, 2 * s);
                ctx.fillStyle = '#000'; ctx.fillRect(cx - 4 * s, cy - 8 * s, 2 * s, 2 * s); ctx.fillRect(cx + 3 * s, cy - 8 * s, 2 * s, 2 * s);
                ctx.fillStyle = '#fff'; ctx.fillRect(cx - 3 * s, cy - 8 * s, 1 * s, 1 * s); ctx.fillRect(cx + 4 * s, cy - 8 * s, 1 * s, 1 * s);
                ctx.fillStyle = '#c4957a'; ctx.fillRect(cx - 1 * s, cy - 3 * s, 3 * s, 1 * s);
                if (dogJumpPhase >= 2 || dogApproachPhase >= 2) { ctx.fillStyle = '#f09090'; ctx.fillRect(cx, cy - 1 * s, 2 * s, 3 * s); }
                ctx.restore();
            }

            function drawBackground() {
                // 夜空黑色背景
                const bgGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
                bgGrad.addColorStop(0, '#020106');
                bgGrad.addColorStop(0.4, '#04020c');
                bgGrad.addColorStop(0.7, '#05030e');
                bgGrad.addColorStop(1, '#030108');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, GAME_W, GAME_H);
                
                const timeSlow = Date.now() * 0.0003;
                
                const nebulaAlpha = 0.025 + sin(timeSlow * 0.7) * 0.008;
                const nebulaGrad1 = ctx.createRadialGradient(GAME_W * 0.35, GAME_H * 0.3, 40, GAME_W * 0.35, GAME_H * 0.3, 280);
                nebulaGrad1.addColorStop(0, `rgba(60, 50, 80, ${nebulaAlpha})`);
                nebulaGrad1.addColorStop(0.5, `rgba(40, 30, 60, ${nebulaAlpha * 0.5})`);
                nebulaGrad1.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = nebulaGrad1;
                ctx.fillRect(0, 0, GAME_W, GAME_H);
                
                const nebulaGrad2 = ctx.createRadialGradient(GAME_W * 0.6, GAME_H * 0.55, 30, GAME_W * 0.6, GAME_H * 0.55, 250);
                nebulaGrad2.addColorStop(0, `rgba(70, 55, 90, ${nebulaAlpha * 0.7})`);
                nebulaGrad2.addColorStop(0.6, `rgba(45, 35, 65, ${nebulaAlpha * 0.3})`);
                nebulaGrad2.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = nebulaGrad2;
                ctx.fillRect(0, 0, GAME_W, GAME_H);
                
                const centralGlow = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, STEP_WIDTH * 0.2, GAME_W / 2, GAME_H / 2, STEP_WIDTH * 0.95);
                const centralAlpha = 0.02 + sin(timeSlow * 0.5 + 1) * 0.005;
                centralGlow.addColorStop(0, `rgba(180, 160, 140, ${centralAlpha})`);
                centralGlow.addColorStop(0.4, `rgba(120, 100, 80, ${centralAlpha * 0.4})`);
                centralGlow.addColorStop(0.75, `rgba(60, 45, 30, ${centralAlpha * 0.15})`);
                centralGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = centralGlow;
                ctx.fillRect(0, 0, GAME_W, GAME_H);
                
                const starSeed = 42;
                const time = Date.now() * 0.0008;
                for (let i = 0; i < 55; i++) {
                    const sx = ((i * 137 + starSeed) % GAME_W);
                    const sy = ((i * 251 + starSeed * 3) % GAME_H);
                    const starSize = (i % 5 === 0) ? 2.5 : (i % 7 === 0 ? 1.2 : 1.8);
                    const twinkle = sin(time + i * 0.7) * 0.4 + 0.6;
                    const starAlpha = twinkle * (0.25 + (i % 4) * 0.12);
                    let starColor;
                    switch (i % 6) {
                        case 0: starColor = '#fffef8'; break;
                        case 1: starColor = '#fffef5'; break;
                        case 2: starColor = '#fffffa'; break;
                        case 3: starColor = '#fffdf0'; break;
                        case 4: starColor = '#fffef8'; break;
                        default: starColor = '#faf8f0';
                    }
                    ctx.globalAlpha = starAlpha;
                    ctx.fillStyle = starColor;
                    ctx.fillRect(sx, sy, starSize, starSize);
                    if (starSize > 2) {
                        ctx.globalAlpha = starAlpha * 0.3;
                        ctx.fillRect(sx - 1, sy - 1, starSize + 2, starSize + 2);
                    }
                }
                ctx.globalAlpha = 1;
                
                for (const lp of lightPoints) lp.draw(ctx);
                for (const p of formulaParticles) p.draw(ctx);
                for (const p of stairParticles) p.draw(ctx);
                
                const mistGrad = ctx.createLinearGradient(0, GAME_H - 120, 0, GAME_H);
                mistGrad.addColorStop(0, 'rgba(20, 18, 25, 0)');
                mistGrad.addColorStop(0.5, 'rgba(20, 18, 25, 0.05)');
                mistGrad.addColorStop(1, 'rgba(15, 12, 20, 0.1)');
                ctx.fillStyle = mistGrad;
                ctx.fillRect(0, GAME_H - 120, GAME_W, 120);
                
                const topMistGrad = ctx.createLinearGradient(0, 0, 0, 100);
                topMistGrad.addColorStop(0, 'rgba(10, 8, 15, 0.08)');
                topMistGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = topMistGrad;
                ctx.fillRect(0, 0, GAME_W, 100);
            }

            function drawDogGlowHint(dogPos) { if (!dogPos || !dogVisible) return; if (gameState === STATE.DIALOGUE) return; if (dogJumpPhase >= 2) return; const time = Date.now() * 0.003; const pulse = sin(time) * 0.35 + 0.65; const alpha = pulse * 0.5; const glowGrad = ctx.createRadialGradient(dogPos.x, dogPos.y, 8, dogPos.x, dogPos.y, 34); glowGrad.addColorStop(0, `rgba(255,220,180,${alpha*0.6})`); glowGrad.addColorStop(0.5, `rgba(255,200,150,${alpha*0.25})`); glowGrad.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = glowGrad; ctx.beginPath(); ctx.arc(dogPos.x, dogPos.y, 34, 0, PI * 2); ctx.fill(); const dotAlpha = pulse * 0.7; ctx.fillStyle = `rgba(255,240,210,${dotAlpha})`; ctx.beginPath(); ctx.arc(dogPos.x, dogPos.y - 8, 3, 0, PI * 2); ctx.fill(); }

            function drawDialogueBox() {
                if (gameState !== STATE.DIALOGUE && dialogueText === '') return;
                const boxH = 100, boxY = GAME_H - boxH - 15, boxX = 25, boxW = GAME_W - 50;
                const boxBgGrad = ctx.createLinearGradient(boxX, boxY, boxX, boxY + boxH);
                boxBgGrad.addColorStop(0, 'rgba(22,20,32,0.94)'); boxBgGrad.addColorStop(1, 'rgba(16,14,26,0.96)');
                ctx.fillStyle = boxBgGrad; ctx.strokeStyle = 'rgba(170,165,195,0.45)'; ctx.lineWidth = 2.5;
                ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(boxX, boxY, boxW, boxH, 12); else ctx.rect(boxX, boxY, boxW, boxH);
                ctx.fill(); ctx.stroke();
                ctx.strokeStyle = 'rgba(130,125,160,0.25)'; ctx.lineWidth = 1;
                ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(boxX+4, boxY+4, boxW-8, boxH-8, 8); else ctx.rect(boxX+4, boxY+4, boxW-8, boxH-8);
                ctx.stroke();
                const indicatorGrad = ctx.createLinearGradient(boxX+boxW/2-25, boxY, boxX+boxW/2+25, boxY);
                indicatorGrad.addColorStop(0,'rgba(200,185,230,0)'); indicatorGrad.addColorStop(0.5,'rgba(200,185,230,0.55)'); indicatorGrad.addColorStop(1,'rgba(200,185,230,0)');
                ctx.fillStyle = indicatorGrad; ctx.fillRect(boxX+boxW/2-25, boxY-1.5, 50, 2.5);
                if (dialogueSpeaker) { if (dialogueSpeaker === '缪缪') ctx.fillStyle = '#f8c8d8'; else if (dialogueSpeaker === '佑佑') ctx.fillStyle = '#f0d890'; else ctx.fillStyle = '#f0d890'; ctx.font = 'bold 15px "Microsoft YaHei", "PingFang SC", sans-serif'; ctx.fillText(dialogueSpeaker, boxX + 20, boxY + 26); }
                ctx.fillStyle = '#f5f0e8'; ctx.font = '15px "Microsoft YaHei", "PingFang SC", sans-serif';
                const textX = boxX + 20, textY = dialogueSpeaker ? boxY + 49 : boxY + 38;
                const lines = wrapText(ctx, dialogueText, boxW - 40);
                for (let i = 0; i < Math.min(lines.length, 2); i++) ctx.fillText(lines[i], textX, textY + i * 22);
            }

            function wrapText(ctx, text, maxWidth) { const lines = []; let currentLine = ''; for (let i = 0; i < text.length; i++) { const char = text[i], testLine = currentLine + char; if (ctx.measureText(testLine).width > maxWidth && currentLine.length > 0) { lines.push(currentLine); currentLine = char; } else currentLine = testLine; } if (currentLine) lines.push(currentLine); return lines; }

            function drawScene() {
                ctx.clearRect(0, 0, GAME_W, GAME_H);
                drawBackground();
                drawStaircase();
                drawLightSource();
                const dogPos = getDogScreenPosition();
                if (dogPos && dogVisible) { drawDogGlowHint(dogPos); drawPixelDog(dogPos.x, dogPos.y, 1.1); }
                const playerScreenX = getPlayerScreenX(), playerScreenY = getPlayerScreenY();
                drawPixelCharacter(playerScreenX, playerScreenY, 1);
                drawHeartParticles(ctx); drawClickRipples(ctx);
                if (dogJumpPhase === 2 && dogPos) { drawPixelDog(dogPos.x, dogPos.y, 1.1); if (random() < 0.5) { const lickX = playerScreenX + (random()-0.5)*10, lickY = playerScreenY - 14 + (random()-0.5)*6; ctx.fillStyle = 'rgba(255,200,210,0.7)'; ctx.fillRect(lickX, lickY, 2, 2); } }
                drawDialogueBox();
                const vignetteGrad = ctx.createRadialGradient(GAME_W/2, GAME_H/2, GAME_W*0.5, GAME_W/2, GAME_H/2, GAME_W*0.82);
                vignetteGrad.addColorStop(0,'rgba(0,0,0,0)'); vignetteGrad.addColorStop(0.6,'rgba(0,0,0,0.08)'); vignetteGrad.addColorStop(1,'rgba(0,0,0,0.5)');
                ctx.fillStyle = vignetteGrad; ctx.fillRect(0,0,GAME_W,GAME_H);
            }

            function gameLoop() { update(); drawScene(); requestAnimationFrame(gameLoop); }

            function init() { playerStepIndex = 10; playerX = GAME_W/2; worldOffsetY = 0; playerFacing = 'down'; dogX = GAME_W/2; dogVisible = true; dogApproachPhase = 0; dogApproachTimer = 0; dogJumpPhase = 0; dogJumpAnim = 0; gameState = STATE.EXPLORING; dialogueQueue = []; dialogueIndex = 0; dialogueCharIndex = 0; dialogueText = ''; dialogueSpeaker = ''; dialogueFullText = ''; heartParticles = []; clickRipples = []; targetX = null; targetStepIndex = null; hasTarget = false; footstepCooldown = 0; }
            init(); gameLoop();
            window.addEventListener('resize', resizeCanvas);
            document.addEventListener('touchmove', function(e) { if (e.target.closest('canvas')) e.preventDefault(); }, { passive: false });
            console.log('✨ 佑佑与无尽阶梯 - 梦境 (樱花光门)');
        })();
    </script>
